services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-ui
    restart: unless-stopped
    ports:
      - "${GRAFANA_HTTP_PORT}:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./datasources:/etc/grafana/provisioning/datasources:ro

  loki:
    image: grafana/loki:3.0.0 # Pinning a stable release is safer than latest
    container_name: monitoring-loki
    ports:
      - "127.0.0.1:${LOKI_HTTP_PORT}:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-storage:/loki # Persistent storage directory
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  alloy:
    image: grafana/alloy:latest
    container_name: monitoring-alloy
    user: root # CRITICAL: Gives Alloy permission to read the docker socket
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-storage:/var/lib/alloy/data
    command: run /etc/alloy/config.alloy --storage.path=/var/lib/alloy/data --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "127.0.0.1:${ALLOY_HTTP_PORT}:12345"
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_HTTP_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-storage:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      
  node-exporter:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter
    restart: unless-stopped
    pid: host
    ports:
      - "127.0.0.1:${NODE_EXPORTER_HTTP_PORT}:9100"
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
      
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: monitoring-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "127.0.0.1:${CADVISOR_HTTP_PORT}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

volumes:
  grafana-storage:
    name: grafana_persistent_data
  loki-storage:
    name: loki_persistent_data
  alloy-storage:
    name: alloy_persistent_data
  prometheus-storage:
    name: prometheus_persistent_data